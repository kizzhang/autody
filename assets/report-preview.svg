<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-label="Autody privacy-safe report preview">
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#240303"/>
      <stop offset="56%" stop-color="#3a0707"/>
      <stop offset="100%" stop-color="#120001"/>
    </linearGradient>
    <radialGradient id="halo" cx="18%" cy="16%" r="70%">
      <stop offset="0%" stop-color="#bd4420" stop-opacity=".62"/>
      <stop offset="100%" stop-color="#120001" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#561915" stop-opacity=".74"/>
      <stop offset="100%" stop-color="#1a0304" stop-opacity=".92"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="1200" height="560" fill="url(#bg)"/>
  <rect width="1200" height="560" fill="url(#halo)"/>
  <g opacity=".24" stroke="#9b4a25" stroke-width="1">
    <path d="M76 88H1124M76 150H1124M76 212H1124M76 274H1124M76 336H1124M76 398H1124"/>
    <path d="M120 62V470M254 62V470M388 62V470M522 62V470M656 62V470M790 62V470M924 62V470M1058 62V470"/>
  </g>
  <g font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif">
    <g transform="translate(72 54)">
      <rect width="44" height="44" rx="13" fill="#d84a22"/>
      <path d="M22 12L32 22L22 32L12 22Z" fill="none" stroke="#fff8ec" stroke-width="2.5"/>
      <text x="62" y="19" font-size="16" font-weight="800" letter-spacing="3" fill="#fff7ea">AUTODY REPORT</text>
      <text x="62" y="46" font-size="17" fill="#cdb2a8">demo workspace, no private creator data</text>
    </g>
    <text x="72" y="172" font-size="56" font-weight="850" fill="#fff7ea">From creator data</text>
    <text x="72" y="236" font-size="56" font-weight="850" fill="#f4c84c">to next-batch decisions</text>
    <text x="76" y="282" font-size="21" fill="#dec0b4">Bubble charts show distribution; sample cards explain what to test next.</text>
  </g>
  <g transform="translate(72 322)" filter="url(#shadow)">
    <rect width="602" height="176" rx="22" fill="#190304" fill-opacity=".82"/>
    <rect x=".5" y=".5" width="601" height="175" rx="21.5" fill="none" stroke="#9a522a" stroke-opacity=".46"/>
    <g stroke="#8f4626" opacity=".45">
      <path d="M54 26V142M178 26V142M302 26V142M426 26V142M550 26V142"/>
      <path d="M42 44H562M42 88H562M42 132H562"/>
    </g>
    <text x="452" y="34" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="12" fill="#c9a292">RADIUS = PLAYS</text>
    <circle cx="188" cy="118" r="28" fill="#f4c84c" opacity=".9"/>
    <circle cx="68" cy="48" r="30" fill="#ff7f54" opacity=".84"/>
    <circle cx="524" cy="96" r="28" fill="#6bdbe2" opacity=".86"/>
    <circle cx="96" cy="86" r="18" fill="#ff7f54" opacity=".74"/>
    <circle cx="328" cy="104" r="12" fill="#6bdbe2" opacity=".78"/>
