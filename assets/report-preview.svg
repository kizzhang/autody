    <text x="224" y="122" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="800" fill="#fff7ea">A</text>
    <text x="103" y="52" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="800" fill="#fff7ea">B</text>
    <text x="555" y="100" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="14" font-weight="800" fill="#fff7ea">C</text>
  </g>
  <g transform="translate(724 118)" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif" filter="url(#shadow)">
    <rect width="404" height="118" rx="24" fill="url(#card)"/>
    <text x="28" y="42" font-size="17" font-weight="850" fill="#f4c84c">Sample A: reusable proof</text>
    <text x="28" y="74" font-size="15" fill="#d8bbb0">Strong save/share behavior after a clear promise.</text>
    <text x="28" y="100" font-size="14" font-weight="750" fill="#8fe3eb">Next: turn it into a repeatable series.</text>
    <rect y="146" width="404" height="118" rx="24" fill="url(#card)"/>
    <text x="28" y="188" font-size="17" font-weight="850" fill="#ff8e5e">Sample B: trend-assisted reach</text>
    <text x="28" y="220" font-size="15" fill="#d8bbb0">High distribution, weaker collection intent.</text>
    <text x="28" y="246" font-size="14" font-weight="750" fill="#8fe3eb">Next: connect attention to a concrete use case.</text>
    <rect y="292" width="404" height="118" rx="24" fill="url(#card)"/>
    <text x="28" y="334" font-size="17" font-weight="850" fill="#8fe3eb">Sample C: route-map content</text>
    <text x="28" y="366" font-size="15" fill="#d8bbb0">Clear path, visible audience anxiety.</text>
    <text x="28" y="392" font-size="14" font-weight="750" fill="#8fe3eb">Next: add personal evidence and before/after proof.</text>
  </g>
