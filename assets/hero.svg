<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Autody GitHub 顶图</title>
  <desc id="desc">Autody 是给 Codex 用的抖音创作者分析技能包，用来从抖音采集自己的创作者数据，用豆包提取逐字稿，并生成报告。</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#210203"/>
      <stop offset="50%" stop-color="#3b0707"/>
      <stop offset="100%" stop-color="#120001"/>
    </linearGradient>
    <radialGradient id="warmGlow" cx="20%" cy="8%" r="72%">
      <stop offset="0%" stop-color="#c0441e" stop-opacity=".72"/>
      <stop offset="45%" stop-color="#7e1b12" stop-opacity=".24"/>
      <stop offset="100%" stop-color="#120001" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="cyanGlow" cx="76%" cy="76%" r="45%">
      <stop offset="0%" stop-color="#55d8df" stop-opacity=".34"/>
      <stop offset="100%" stop-color="#55d8df" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#4d1713" stop-opacity=".7"/>
      <stop offset="100%" stop-color="#1b0304" stop-opacity=".9"/>
    </linearGradient>
    <linearGradient id="cream" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#fff7ec"/>
      <stop offset="100%" stop-color="#f3d39b"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="22" flood-color="#000000" flood-opacity=".32"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity=".22"/>
    </filter>
    <pattern id="dots" width="22" height="22" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#f4be61" opacity=".22"/>
    </pattern>

    <g id="autodyMark">
      <rect width="58" height="58" rx="17" fill="#d84a22"/>
      <path d="M29 16L42 29L29 42L16 29Z" fill="none" stroke="#fff8ec" stroke-width="3" stroke-linejoin="round"/>
      <path d="M14 22L14 36L25 29Z" fill="#ffd35a"/>
      <path d="M36 23h7c6 0 10 4 10 9s-4 9-10 9h-3l-6 5v-6" fill="none" stroke="#8fe8ef" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
    <g id="douyinNode">
      <rect width="78" height="78" rx="22" fill="#090909"/>
      <path d="M29 26L29 52L51 39Z" fill="#fff8ec"/>
      <path d="M25 25L25 51" stroke="#55d8df" stroke-width="5" stroke-linecap="round" opacity=".95"/>
      <path d="M53 31L53 47" stroke="#ff5e4f" stroke-width="5" stroke-linecap="round" opacity=".9"/>
    </g>
    <g id="doubaoNode">
      <rect width="78" height="78" rx="22" fill="#eaf8ff"/>
      <path d="M19 38c0-14 12-24 29-24 13 0 22 7 22 18 0 15-15 25-32 25H28l-10 9 3-13c-1-4-2-9-2-15Z" fill="#4ab7ff"/>
      <circle cx="36" cy="36" r="4" fill="#ffffff"/>
      <circle cx="49" cy="36" r="4" fill="#ffffff"/>
      <path d="M32 48c6 4 14 4 20 0" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    </g>
    <g id="codexNode">
      <rect width="78" height="78" rx="22" fill="#fff6df"/>
      <path d="M25 30L16 39L25 48" fill="none" stroke="#210203" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M53 30L62 39L53 48" fill="none" stroke="#210203" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M44 23L34 55" stroke="#d84a22" stroke-width="4" stroke-linecap="round"/>
    </g>
  </defs>

  <rect width="1200" height="630" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="630" rx="28" fill="url(#warmGlow)"/>
  <rect width="1200" height="630" rx="28" fill="url(#cyanGlow)"/>
  <rect x="52" y="52" width="1096" height="526" rx="26" fill="url(#dots)" opacity=".62"/>

  <g stroke="#9c4b25" stroke-opacity=".32" stroke-width="1">
    <path d="M76 138H1124M76 230H1124M76 322H1124M76 414H1124M76 506H1124"/>
    <path d="M154 76V554M304 76V554M454 76V554M604 76V554M754 76V554M904 76V554M1054 76V554"/>
  </g>

  <g font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif">
    <g transform="translate(78 72)">
      <use href="#autodyMark"/>
      <text x="78" y="25" font-size="23" font-weight="800" letter-spacing="5" fill="#fff8ec">AUTODY</text>
      <text x="78" y="54" font-size="18" font-weight="600" fill="#e4b9aa">给 Codex 用的抖音创作者分析技能包</text>
    </g>

    <text x="78" y="224" font-size="64" font-weight="850" letter-spacing="-2" fill="#fff8ec">抖音走豆包</text>
    <text x="78" y="296" font-size="64" font-weight="850" letter-spacing="-2" fill="#f4c84c">报告交给 Codex</text>
    <text x="78" y="346" font-size="23" font-weight="650" fill="#e9c6b8">采集自己的数据，逐条提取文本，生成报告。</text>
    <text x="78" y="382" font-size="20" font-weight="700" fill="#9fe6eb">只分析自己的账号或获授权数据。</text>

    <g transform="translate(78 426)" filter="url(#softShadow)">
      <rect width="500" height="72" rx="18" fill="url(#cream)"/>
      <circle cx="34" cy="36" r="8" fill="#d84a22"/>
      <circle cx="58" cy="36" r="8" fill="#f4c84c"/>
      <circle cx="82" cy="36" r="8" fill="#6bdbe2"/>
      <text x="116" y="44" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" font-weight="800" fill="#210203">$ npx autody@latest install</text>
    </g>

    <g transform="translate(78 526)">
      <rect width="164" height="34" rx="17" fill="#fff1d2" fill-opacity=".18"/>
      <text x="24" y="23" font-size="15" font-weight="750" fill="#fff1d2">只分析自己</text>
      <rect x="178" width="128" height="34" rx="17" fill="#fff1d2" fill-opacity=".18"/>
      <text x="198" y="23" font-size="15" font-weight="750" fill="#fff1d2">本机登录态</text>
      <rect x="320" width="160" height="34" rx="17" fill="#fff1d2" fill-opacity=".18"/>
      <text x="344" y="23" font-size="15" font-weight="750" fill="#fff1d2">可断点续跑</text>
    </g>
  </g>

  <g transform="translate(622 92)" filter="url(#shadow)" font-family="Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif">
    <rect width="508" height="438" rx="30" fill="url(#panel)"/>
    <rect x="1" y="1" width="506" height="436" rx="29" fill="none" stroke="#ffb05a" stroke-opacity=".28"/>
    <text x="254" y="58" text-anchor="middle" font-size="18" font-weight="850" letter-spacing="3" fill="#fff8ec">工作流</text>
    <text x="254" y="88" text-anchor="middle" font-size="18" font-weight="700" fill="#e4b9aa">抖音数据进入，豆包提取文本，Codex 生成报告</text>

    <g transform="translate(46 126)">
      <use href="#douyinNode"/>
      <text x="39" y="110" text-anchor="middle" font-size="16" font-weight="850" fill="#fff8ec">抖音数据</text>
      <text x="39" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#d6b3a9">播放、评论、链接</text>
    </g>
    <path d="M144 165H188" stroke="#fff1d2" stroke-width="4" stroke-linecap="round" opacity=".42"/>
    <path d="M176 153L189 165L176 177" stroke="#fff1d2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity=".42"/>
    <g transform="translate(198 126)">
      <use href="#doubaoNode"/>
      <text x="39" y="110" text-anchor="middle" font-size="16" font-weight="850" fill="#fff8ec">豆包转写</text>
      <text x="39" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#d6b3a9">逐字稿、图文文字</text>
    </g>
    <path d="M296 165H340" stroke="#fff1d2" stroke-width="4" stroke-linecap="round" opacity=".42"/>
    <path d="M328 153L341 165L328 177" stroke="#fff1d2" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" opacity=".42"/>
    <g transform="translate(350 126)">
      <use href="#codexNode"/>
      <text x="39" y="110" text-anchor="middle" font-size="16" font-weight="850" fill="#fff8ec">Codex 执行</text>
      <text x="39" y="135" text-anchor="middle" font-size="13" font-weight="700" fill="#d6b3a9">按技能断点续跑</text>
    </g>

    <g transform="translate(46 304)">
      <rect width="416" height="82" rx="24" fill="#fff7e8" fill-opacity=".12"/>
      <use href="#autodyMark" transform="translate(22 12) scale(.86)"/>
      <text x="96" y="34" font-size="18" font-weight="900" fill="#f4c84c">Autody 报告</text>
      <text x="96" y="62" font-size="15" font-weight="700" fill="#e4b9aa">HTML、JSON、CSV、Markdown，沉淀为下一轮上下文</text>
    </g>
  </g>
</svg>
