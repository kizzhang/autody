<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Autody Lumina Template</title>
  <style>
    body.sdv-lumina {
      --ink: #171e19;
      --paper: #fff0a9;
      --surface: #fffdf2;
      --line: rgba(23, 30, 25, .18);
      --gold: #f8cf3f;
      --cyan: #2399a5;
      --coral: #e85f3f;
      --muted: rgba(23, 30, 25, .68);
      margin: 0;
      background: linear-gradient(155deg, #ffe17c 0%, #fff2b8 48%, #f4f7ee 100%);
      color: var(--ink);
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", system-ui, sans-serif;
    }
    body.sdv-lumina .topbar,
    body.sdv-lumina .hero,
    body.sdv-lumina .section,
    body.sdv-lumina .data-plaque,
    body.sdv-lumina .table-wrap {
      border-color: var(--line);
    }
  </style>
</head>
<body class="sdv-lumina">
  <main>
    <section class="hero">
      <p>This file is the packaged Lumina visual reference. Runtime reports are generated from current data by render_lumina_report.cjs.</p>
    </section>
  </main>
</body>
</html>
